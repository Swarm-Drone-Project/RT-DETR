__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r18vd.yml',
]

output_dir: ./output/rtdetrv2_r18vd_drone_gray1ch

num_classes: 1
remap_mscoco_category: False

use_amp: True

task: detection
evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

PResNet:
  depth: 18
  variant: d
  freeze_at: 0
  return_idx: [1, 2, 3]
  num_stages: 4
  freeze_norm: False
  pretrained: True
  in_channels: 1

HybridEncoder:
  in_channels: [128, 256, 512]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  enc_act: gelu
  expansion: 1.0
  depth_mult: 1
  act: silu
  use_temporal: False

RTDETRTransformerv2:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3
  num_layers: 6
  num_queries: 100          # reduced from 300 — single class, few targets per frame
  num_denoising: 50         # reduced from 100 — scales with num_queries
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  eval_idx: -1
  num_points: [4, 4, 4]
  cross_attn_method: default
  query_select_method: default

RTDETRPostProcessor:
  num_top_queries: 100      # must match num_queries

RTDETRCriterionv2:
  weight_dict:
    loss_vfl:  1
    loss_bbox: 5
    loss_giou: 2
  losses: ['vfl', 'boxes']
  alpha: 0.75
  gamma: 2.0
  matcher:
    type: HungarianMatcher
    weight_dict:
      cost_class: 2
      cost_bbox:  5
      cost_giou:  2
    alpha: 0.25
    gamma: 2.0

optimizer:
  type: AdamW
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

train_dataloader:
  total_batch_size: 8
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/devananth/office/Vision/Dataset/Data_Gray/images/train/
    ann_file:   /home/devananth/office/Vision/Dataset/Data_Gray/annotations/train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: RandomPhotometricDistort}
        - {type: RandomZoomOut}
        - {type: RandomIoUCrop}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertToGrayscale}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 71
        ops: ['RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction
    scales: [480, 512, 544, 576, 608, 640, 640, 640, 672, 704, 736, 768, 800]
    stop_epoch: 71

val_dataloader:
  total_batch_size: 8
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/devananth/office/Vision/Dataset/Data_Gray/images/val/
    ann_file:   /home/devananth/office/Vision/Dataset/Data_Gray/annotations/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertToGrayscale}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction

epoches: 72
