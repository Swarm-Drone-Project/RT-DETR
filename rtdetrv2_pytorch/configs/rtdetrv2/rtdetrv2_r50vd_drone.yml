__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

output_dir: ./output/rtdetrv2_r50vd_drone

num_classes: 1
remap_mscoco_category: False

tuning: ./rtdetrv2_r50vd_6x_coco_ema.pth

task: detection
evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

train_dataloader:
  total_batch_size: 4        # ← correct key, reduced from 16
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/devananth/office/Vision/Dataset/Data/images/train/
    ann_file: /home/devananth/office/Vision/Dataset/Data/annotations/train.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: RandomPhotometricDistort}
        - {type: RandomZoomOut}
        - {type: RandomIoUCrop}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  total_batch_size: 4        # ← correct key
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: /home/devananth/office/Vision/Dataset/Data/images/val/
    ann_file: /home/devananth/office/Vision/Dataset/Data/annotations/val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
